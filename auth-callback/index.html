<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ouverture de Devix</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, sans-serif;
        color: #20332f;
        background: #f6f3ee;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(520px, 100%);
        display: grid;
        gap: 14px;
        padding: 24px;
        border: 1px solid #ded5cb;
        border-radius: 8px;
        background: #fff;
      }

      h1 {
        margin: 0;
        font-size: 24px;
      }

      p {
        margin: 0;
        color: #62564e;
        line-height: 1.45;
      }

      a {
        color: #1f5f52;
        font-weight: 800;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 8px;
      }

      .button {
        min-height: 38px;
        display: inline-flex;
        align-items: center;
        padding: 0 14px;
        border-radius: 6px;
        background: #1f5f52;
        color: white;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Ouverture de Devix</h1>
      <p id="status">Votre lien est valide. Devix va finaliser la connexion dans la fenetre deja ouverte.</p>
      <p id="fallback" hidden>Vous pouvez fermer cette page si le navigateur ne l'a pas fermee automatiquement.</p>
      <div class="actions">
        <a class="button" id="openLocal" href="http://127.0.0.1:43177/auth-callback">Finaliser dans Devix</a>
        <a class="button" id="openApp" href="devix://app/index.html">Ouvrir Devix</a>
      </div>
    </main>
    <script>
      const localCallback = `http://127.0.0.1:43177/auth-callback${window.location.search || ""}${window.location.hash || ""}`;
      const deepLink = `devix://app/index.html${window.location.search || ""}${window.location.hash || ""}`;
      const openLocal = document.getElementById("openLocal");
      const openApp = document.getElementById("openApp");
      const status = document.getElementById("status");
      const fallback = document.getElementById("fallback");

      openLocal.href = localCallback;
      openApp.href = deepLink;

      function closeThisTab() {
        window.setTimeout(() => window.close(), 250);
        window.setTimeout(() => {
          fallback.hidden = false;
        }, 1400);
      }

      async function finalizeInDevix() {
        try {
          await fetch(localCallback, { cache: "no-store" });
          status.textContent = "Connexion terminee dans Devix. Fermeture de cette page...";
          closeThisTab();
        } catch {
          window.location.href = localCallback;
        }
      }

      finalizeInDevix();
    </script>
  </body>
</html>
