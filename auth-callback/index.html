<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ouverture de Devix</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, sans-serif;
        color: #20332f;
        background: #f6f3ee;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(520px, 100%);
        display: grid;
        gap: 14px;
        padding: 24px;
        border: 1px solid #ded5cb;
        border-radius: 8px;
        background: #fff;
      }

      h1 {
        margin: 0;
        font-size: 24px;
      }

      p {
        margin: 0;
        color: #62564e;
        line-height: 1.45;
      }

      a {
        color: #1f5f52;
        font-weight: 800;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 8px;
      }

      .button {
        min-height: 38px;
        display: inline-flex;
        align-items: center;
        padding: 0 14px;
        border-radius: 6px;
        background: #1f5f52;
        color: white;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Ouverture de Devix</h1>
      <p>Votre lien est valide. Si Devix est installé sur cet ordinateur, l'application va s'ouvrir automatiquement.</p>
      <p id="fallback" hidden>Si rien ne se passe, ouvrez Devix manuellement puis reconnectez-vous, ou installez l'application sur cet ordinateur.</p>
      <div class="actions">
        <a class="button" id="openApp" href="atelier://app/index.html">Ouvrir Devix</a>
      </div>
    </main>
    <script>
      const deepLink = `atelier://app/index.html${window.location.search || ""}${window.location.hash || ""}`;
      const openApp = document.getElementById("openApp");
      const fallback = document.getElementById("fallback");

      openApp.href = deepLink;
      window.location.href = deepLink;
      window.setTimeout(() => {
        fallback.hidden = false;
      }, 1400);
    </script>
  </body>
</html>
